<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Realm v1.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; -webkit-tap-highlight-color: transparent; font-family: system-ui, sans-serif; }
        .card-p1 { border: 4px solid #f85149; box-shadow: 0 0 15px rgba(248, 81, 73, 0.4); }
        .card-p2 { border: 4px solid #58a6ff; box-shadow: 0 0 15px rgba(58, 166, 255, 0.4); }
        .tab-active { color: #f2cc60; border-bottom: 2px solid #f2cc60; }
        .nfc-active { animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green {
            0% { background-color: #052e16; }
            50% { background-color: #166534; }
            100% { background-color: #052e16; }
        }
        /* Prevents accidental double-taps zooming or ghosting */
        * { touch-action: manipulation; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- NFC Banner -->
    <div id="nfcBanner" class="bg-gray-800 text-[10px] font-black p-2 text-center uppercase tracking-widest h-10 flex items-center justify-center">
        NFC Sensor: Idle
    </div>

    <!-- Header -->
    <header class="p-4 bg-gray-900 flex justify-between items-center sticky top-0 z-50 border-b border-gray-800">
        <div>
            <h1 class="text-xl font-black italic text-yellow-500 tracking-tighter leading-none">NFC REALM</h1>
            <span class="text-[8px] text-gray-500 font-bold uppercase tracking-widest">v1.7 Event Shield</span>
        </div>
        <button onclick="setNFCMode('identify')" class="bg-blue-600 text-white text-[10px] font-black py-2 px-4 rounded-full uppercase shadow-lg">Identify Tag</button>
    </header>

    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 flex justify-around p-3 z-50">
        <button onclick="switchTab('collection')" id="btn-collection" class="text-[10px] font-bold uppercase tracking-widest tab-active">Deck</button>
        <button onclick="switchTab('editor')" id="btn-editor" class="text-[10px] font-bold uppercase tracking-widest text-gray-400">The Lab</button>
    </nav>

    <!-- VIEW: COLLECTION -->
    <section id="view-collection" class="p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Arena Slots</h2>
            <button onclick="createNewCard()" class="text-[10px] bg-white text-black px-3 py-1 rounded-full font-bold uppercase">+ New Hero</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div id="slot-1" onclick="clearSlot(1)" class="h-32 border-2 border-dashed border-red-500/30 rounded-2xl flex items-center justify-center text-[10px] font-bold text-red-500 bg-red-900/5 overflow-hidden transition-all">
                P1 EMPTY
            </div>
            <div id="slot-2" onclick="clearSlot(2)" class="h-32 border-2 border-dashed border-blue-500/30 rounded-2xl flex items-center justify-center text-[10px] font-bold text-blue-500 bg-blue-900/5 overflow-hidden transition-all">
                P2 EMPTY
            </div>
        </div>

        <button id="battleStartBtn" onclick="openArena()" class="hidden w-full bg-yellow-500 text-black py-4 rounded-2xl font-black uppercase mb-6 tracking-widest shadow-xl">Enter Arena</button>
        
        <h2 class="text-[10px] font-bold text-gray-600 uppercase mb-3 tracking-widest">Library</h2>
        <div id="deckGrid" class="grid grid-cols-2 gap-4"></div>
    </section>

    <!-- VIEW: THE LAB -->
    <section id="view-editor" class="hidden p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4 bg-gray-900 p-2 rounded-xl border border-gray-800">
                <button onclick="changeEditorIndex(-1)" class="p-2 text-yellow-500 text-2xl font-bold">◀</button>
                <span id="editorInfo" class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Card 1 / 1</span>
                <button onclick="changeEditorIndex(1)" class="p-2 text-yellow-500 text-2xl font-bold">▶</button>
            </div>

            <div class="bg-gray-900 p-5 rounded-3xl border border-gray-800 shadow-2xl">
                <div class="relative mb-4">
                    <img id="edit-preview-img" src="" class="w-full h-56 object-cover rounded-2xl border border-gray-700">
                    <button onclick="setNFCMode('link')" class="absolute top-2 right-2 bg-yellow-500 text-black text-[9px] font-black p-2 rounded-lg border border-black/20 shadow-lg uppercase">Link Tag</button>
                </div>

                <div class="space-y-3">
                    <input type="text" id="edit-img" placeholder="Image URL" oninput="syncEditor()" class="w-full bg-black p-2 rounded-xl text-xs border border-gray-800 outline-none">
                    <input type="text" id="edit-name" placeholder="Hero Name" oninput="syncEditor()" class="w-full bg-black p-2 rounded-xl text-sm font-bold border border-gray-800 outline-none">
                </div>

                <div class="grid grid-cols-3 gap-2 my-4">
                    <div class="bg-black p-2 rounded-xl border border-gray-800 text-center">
                        <label class="block text-[8px] text-red-500 font-bold uppercase mb-1">HP</label>
                        <input type="number" id="edit-hp" oninput="syncEditor()" class="w-full bg-transparent text-sm font-bold outline-none text-center">
                    </div>
                    <div class="bg-black p-2 rounded-xl border border-gray-800 text-center">
                        <label class="block text-[8px] text-orange-500 font-bold uppercase mb-1">ATK</label>
                        <input type="number" id="edit-atk" oninput="syncEditor()" class="w-full bg-transparent text-sm font-bold outline-none text-center">
                    </div>
                    <div class="bg-black p-2 rounded-xl border border-gray-800 text-center">
                        <label class="block text-[8px] text-blue-500 font-bold uppercase mb-1">DEF</label>
                        <input type="number" id="edit-def" oninput="syncEditor()" class="w-full bg-transparent text-sm font-bold outline-none text-center">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 mb-6">
                    <input type="text" id="edit-m-atk" oninput="syncEditor()" placeholder="Atk Name" class="bg-black p-2 rounded-lg border border-gray-800 text-[9px] text-center uppercase">
                    <input type="text" id="edit-m-def" oninput="syncEditor()" placeholder="Def Name" class="bg-black p-2 rounded-lg border border-gray-800 text-[9px] text-center uppercase">
                    <input type="text" id="edit-m-heal" oninput="syncEditor()" placeholder="Heal Name" class="bg-black p-2 rounded-lg border border-gray-800 text-[9px] text-center uppercase">
                </div>

                <div class="border-t border-gray-800 pt-4 mt-4 grid grid-cols-2 gap-2">
                    <button onclick="exportSingle()" class="bg-gray-800 text-[9px] py-3 rounded-lg uppercase font-bold text-gray-300">Copy JSON</button>
                    <button onclick="importJSON()" class="bg-gray-800 text-[9px] py-3 rounded-lg uppercase font-bold text-gray-300">Import</button>
                    <button onclick="cloneCurrent()" class="bg-gray-800 text-[9px] py-3 rounded-lg uppercase font-bold text-gray-300">Clone</button>
                    <button onclick="deleteCurrent()" class="bg-red-900/20 text-red-500 text-[9px] py-3 rounded-lg uppercase font-bold">Delete</button>
                </div>
            </div>
        </div>
    </section>

    <!-- ARENA -->
    <div id="arena" class="hidden fixed inset-0 bg-black z-[100] p-4 flex flex-col">
        <div id="arena-stage" class="flex-grow flex items-center justify-between gap-4"></div>
        <div id="battleLog" class="h-28 bg-gray-900 rounded-xl p-3 font-mono text-[10px] overflow-y-auto mb-4 border border-gray-800 text-gray-400"></div>
        <div id="moveGrid" class="grid grid-cols-2 gap-2"></div>
    </div>

    <script>
        // --- CORE DATA ---
        let deck = JSON.parse(localStorage.getItem('nfc_realm_deck')) || [];
        let editIdx = 0;
        let p1 = null, p2 = null;
        let turn = 1;
        
        // Anti-Ghosting Shield
        let lastInteractionTime = 0;

        window.onload = () => {
            if (deck.length === 0) {
                deck.push(createCardData("Cyber Shark", "https://picsum.photos/seed/shark/400/600", "id_shark_001"));
                save();
            }
            renderDeck();
            loadEditor();
        };

        function createCardData(name, img, id) {
            return {
                id: id || "hero_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5),
                name: name || "New Hero",
                img: img || "https://picsum.photos/400/600",
                hp: 20, maxHp: 20, atk: 5, def: 2,
                moves: { atk: "Strike", def: "Shield", heal: "Repair" },
                poisoned: false
            };
        }

        // --- STABLE SELECTION LOGIC ---
        function selectByIndex(index, event) {
            // 1. Debounce clicks to prevent double-firing
            const now = Date.now();
            if (now - lastInteractionTime < 250) return; 
            lastInteractionTime = now;

            // 2. Identify target card
            const card = deck[index];
            if (!card) return;

            // 3. ATOMIC SELECTION CHAIN
            // We use the 'id' for logical checking but treat each index as a separate tap
            
            // Check if this EXACT card (by id) is in Slot 1
            if (p1 && p1.id === card.id) {
                p1 = null; 
            } 
            // Check if this EXACT card (by id) is in Slot 2
            else if (p2 && p2.id === card.id) {
                p2 = null;
            } 
            // Try to fill Player 1
            else if (p1 === null) {
                p1 = JSON.parse(JSON.stringify(card));
            } 
            // Try to fill Player 2
            else if (p2 === null) {
                p2 = JSON.parse(JSON.stringify(card));
            } 
            // Replace Player 2
            else {
                p2 = JSON.parse(JSON.stringify(card));
            }

            updateSlotsUI();
        }

        function clearSlot(num) {
            if(num === 1) p1 = null; else p2 = null;
            updateSlotsUI();
        }

        function updateSlotsUI() {
            document.getElementById('slot-1').innerHTML = p1 ? `<img src="${p1.img}" class="h-full w-full object-cover rounded-xl shadow-lg">` : "P1 EMPTY";
            document.getElementById('slot-2').innerHTML = p2 ? `<img src="${p2.img}" class="h-full w-full object-cover rounded-xl shadow-lg">` : "P2 EMPTY";
            document.getElementById('battleStartBtn').classList.toggle('hidden', !(p1 && p2));
            renderDeck();
        }

        function renderDeck() {
            const grid = document.getElementById('deckGrid');
            grid.innerHTML = deck.map((c, index) => {
                let borderClass = "border-transparent";
                if (p1?.id === c.id) borderClass = "card-p1";
                if (p2?.id === c.id) borderClass = "card-p2";
                
                return `
                <div onclick="selectByIndex(${index}, event)" class="bg-gray-900 rounded-2xl overflow-hidden border-2 transition-transform active:scale-95 ${borderClass}">
                    <img src="${c.img}" class="w-full h-32 object-cover opacity-80 pointer-events-none">
                    <div class="p-3 pointer-events-none">
                        <div class="text-[10px] font-black uppercase truncate">${c.name}</div>
                    </div>
                </div>
            `}).join('');
        }

        // --- NFC ENGINE ---
        let nfcReader = null;
        let currentMode = null;

        async function setNFCMode(mode) {
            if (!('NDEFReader' in window)) return alert("NFC Not Supported.");
            currentMode = mode;
            const banner = document.getElementById('nfcBanner');
            banner.innerText = mode === 'link' ? "NFC: TAP TO LINK" : "NFC: TAP TO IDENTIFY";
            banner.classList.add('nfc-active');

            if (!nfcReader) {
                try {
                    nfcReader = new NDEFReader();
                    await nfcReader.scan();
                    nfcReader.onreading = (e) => {
                        const now = Date.now();
                        if (now - lastInteractionTime < 2000) return; 
                        lastInteractionTime = now;
                        
                        if (navigator.vibrate) navigator.vibrate(100);
                        const tagId = e.serialNumber;
                        
                        if (currentMode === 'link') {
                            deck[editIdx].id = tagId;
                            save(); loadEditor(); renderDeck();
                            banner.innerText = "LINKED: " + deck[editIdx].name;
                            banner.classList.remove('nfc-active');
                            currentMode = null;
                        } else if (currentMode === 'identify') {
                            const foundIdx = deck.findIndex(c => c.id === tagId);
                            if (foundIdx !== -1) {
                                selectByIndex(foundIdx);
                                banner.innerText = "IDENTIFIED: " + deck[foundIdx].name;
                            } else { banner.innerText = "UNKNOWN TAG"; }
                        }
                    };
                } catch (err) { banner.innerText = "NFC DENIED"; }
            }
        }

        // --- THE LAB ---
        function loadEditor() {
            const c = deck[editIdx];
            if(!c) return;
            document.getElementById('editorInfo').innerText = `Card ${editIdx+1} / ${deck.length}`;
            document.getElementById('edit-name').value = c.name;
            document.getElementById('edit-img').value = c.img;
            document.getElementById('edit-hp').value = c.hp;
            document.getElementById('edit-atk').value = c.atk;
            document.getElementById('edit-def').value = c.def;
            document.getElementById('edit-m-atk').value = c.moves.atk;
            document.getElementById('edit-m-def').value = c.moves.def;
            document.getElementById('edit-m-heal').value = c.moves.heal;
            document.getElementById('edit-preview-img').src = c.img;
        }

        function syncEditor() {
            const c = deck[editIdx];
            c.name = document.getElementById('edit-name').value;
            c.img = document.getElementById('edit-img').value;
            c.hp = parseInt(document.getElementById('edit-hp').value) || 1;
            c.maxHp = c.hp;
            c.atk = parseInt(document.getElementById('edit-atk').value) || 0;
            c.def = parseInt(document.getElementById('edit-def').value) || 0;
            c.moves.atk = document.getElementById('edit-m-atk').value;
            c.moves.def = document.getElementById('edit-m-def').value;
            c.moves.heal = document.getElementById('edit-m-heal').value;
            document.getElementById('edit-preview-img').src = c.img;
            save(); renderDeck();
        }

        function changeEditorIndex(dir) {
            editIdx = (editIdx + dir + deck.length) % deck.length;
            loadEditor();
        }

        function createNewCard() {
            deck.push(createCardData());
            editIdx = deck.length - 1;
            save(); switchTab('editor'); loadEditor();
        }

        function cloneCurrent() {
            const clone = JSON.parse(JSON.stringify(deck[editIdx]));
            // Force a unique software ID for the clone
            clone.id = "hero_" + Date.now() + "_" + Math.random().toString(36).substr(2, 5);
            clone.name += " (Clone)";
            deck.push(clone);
            save(); changeEditorIndex(1);
        }

        function deleteCurrent() {
            if(deck.length <= 1) return;
            deck.splice(editIdx, 1);
            editIdx = 0; save(); loadEditor(); renderDeck();
        }

        function exportSingle() {
            navigator.clipboard.writeText(JSON.stringify(deck[editIdx])).then(() => alert("JSON Copied!"));
        }

        function importJSON() {
            const s = prompt("Paste JSON:");
            if(!s) return;
            try {
                const o = JSON.parse(s);
                o.id = "imp_" + Date.now();
                deck.push(o); save(); editIdx = deck.length-1; loadEditor(); renderDeck();
            } catch(e) { alert("Invalid JSON"); }
        }

        // --- BATTLE ARENA ---
        function openArena() {
            document.getElementById('arena').classList.remove('hidden');
            renderArena();
        }

        function renderArena() {
            const stage = document.getElementById('arena-stage');
            stage.innerHTML = `
                <div class="w-1/2 flex flex-col items-center">
                    <div class="relative w-full aspect-[3/4] rounded-2xl overflow-hidden border-4 border-red-500 ${p1.poisoned?'nfc-active':''}">
                        <img src="${p1.img}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 w-full bg-black/80 p-2">
                            <div class="bg-gray-700 h-1 rounded-full overflow-hidden"><div class="bg-green-500 h-full" style="width:${(p1.hp/p1.maxHp)*100}%"></div></div>
                        </div>
                    </div>
                </div>
                <div class="w-1/2 flex flex-col items-center">
                    <div class="relative w-full aspect-[3/4] rounded-2xl overflow-hidden border-4 border-blue-500 ${p2.poisoned?'nfc-active':''}">
                        <img src="${p2.img}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 w-full bg-black/80 p-2">
                            <div class="bg-gray-700 h-1 rounded-full overflow-hidden"><div class="bg-green-500 h-full" style="width:${(p2.hp/p2.maxHp)*100}%"></div></div>
                        </div>
                    </div>
                </div>
            `;
            const actor = turn === 1 ? p1 : p2;
            document.getElementById('moveGrid').innerHTML = `
                <button onclick="doMove('atk')" class="bg-red-700 p-4 rounded-xl font-bold text-xs uppercase">${actor.moves.atk}</button>
                <button onclick="doMove('def')" class="bg-blue-700 p-4 rounded-xl font-bold text-xs uppercase">${actor.moves.def}</button>
                <button onclick="doMove('heal')" class="bg-green-700 p-4 rounded-xl font-bold text-xs uppercase">${actor.moves.heal}</button>
                <button onclick="doMove('takeover')" class="bg-purple-700 p-4 rounded-xl font-bold text-[8px] uppercase">Takeover</button>
                <button onclick="doMove('wealth')" class="bg-yellow-600 text-black p-4 rounded-xl font-bold text-xs uppercase col-span-2">Wealth Buff</button>
            `;
        }

        function doMove(type) {
            const actor = turn === 1 ? p1 : p2;
            const target = turn === 1 ? p2 : p1;
            let msg = "";

            if (type === 'atk') {
                let d = Math.max(1, actor.atk - target.def);
                target.hp -= d; msg = `${actor.name} dealt ${d} damage!`;
            } else if (type === 'def') {
                actor.def += 1; msg = `${actor.name} DEF +1!`;
            } else if (type === 'heal') {
                actor.hp = Math.min(actor.maxHp, actor.hp + 5); msg = `${actor.name} healed!`;
            } else if (type === 'takeover') {
                if(Math.random() > 0.3) { target.hp -= 2; target.poisoned = true; msg = "Takeover Success!"; }
                else msg = "Takeover Failed!";
            } else if (type === 'wealth') {
                if(Math.random() < 0.9) { actor.atk += 2; msg = "Wealth Up!"; }
                else { actor.atk = 0; msg = "Wealth Crash!"; }
            }

            const log = document.getElementById('battleLog');
            log.innerHTML = `<div>> ${msg}</div>` + log.innerHTML;
            if (target.hp <= 0) { alert(actor.name + " WINS!"); location.reload(); }
            else { turn = turn === 1 ? 2 : 1; renderArena(); }
        }

        // --- HELPERS ---
        function save() { localStorage.setItem('nfc_realm_deck', JSON.stringify(deck)); }
        function switchTab(t) {
            document.getElementById('view-collection').classList.toggle('hidden', t !== 'collection');
            document.getElementById('view-editor').classList.toggle('hidden', t !== 'editor');
            document.getElementById('btn-collection').classList.toggle('tab-active', t === 'collection');
            document.getElementById('btn-editor').classList.toggle('tab-active', t === 'editor');
            currentMode = null;
            document.getElementById('nfcBanner').innerText = "NFC Sensor: Idle";
            document.getElementById('nfcBanner').classList.remove('nfc-active');
        }
    </script>
</body>
</html>
