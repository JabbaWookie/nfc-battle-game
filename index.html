<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Realm: The Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .card-p1 { border: 4px solid #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        .card-p2 { border: 4px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .tab-active { color: #eab308; border-bottom: 2px solid #eab308; }
        .poison-anim { animation: poison-pulse 2s infinite; }
        @keyframes poison-pulse {
            0%, 100% { box-shadow: 0 0 0px rgba(34, 197, 94, 0); }
            50% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.8); }
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <header class="p-4 bg-gray-900 flex justify-between items-center sticky top-0 z-50 border-b border-gray-800">
        <h1 class="text-xl font-black italic text-yellow-500 tracking-tighter">NFC REALM</h1>
        <button id="nfcBtn" onclick="startNFC()" class="bg-red-600 text-white text-[10px] font-black py-2 px-4 rounded-full transition-all">
            ACTIVATE NFC
        </button>
    </header>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 flex justify-around p-3 z-50">
        <button onclick="switchTab('collection')" id="btn-collection" class="text-[10px] font-bold uppercase tracking-widest tab-active">Collection</button>
        <button onclick="switchTab('editor')" id="btn-editor" class="text-[10px] font-bold uppercase tracking-widest text-gray-500">The Lab</button>
    </nav>

    <!-- VIEW: COLLECTION -->
    <section id="view-collection" class="p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-bold text-gray-500 uppercase">Your Deck</h2>
            <button onclick="createNewCard()" class="text-[10px] bg-white text-black px-3 py-1 rounded-full font-bold">+ CREATE</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div id="slot-1" class="h-24 border border-dashed border-red-500/30 rounded flex items-center justify-center text-[10px] font-bold text-red-500">P1 SLOT</div>
            <div id="slot-2" class="h-24 border border-dashed border-blue-500/30 rounded flex items-center justify-center text-[10px] font-bold text-blue-500">P2 SLOT</div>
        </div>

        <button id="battleStartBtn" onclick="openArena()" class="hidden w-full bg-yellow-500 text-black py-4 rounded font-black uppercase mb-6 tracking-widest">Enter Battle</button>

        <div id="deckGrid" class="grid grid-cols-2 gap-4"></div>
    </section>

    <!-- VIEW: THE LAB (EDITOR) -->
    <section id="view-editor" class="hidden p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6 bg-gray-900 p-2 rounded-lg">
                <button onclick="changeEditorIndex(-1)" class="p-2">◀</button>
                <span id="editorInfo" class="text-xs font-bold text-yellow-500 uppercase">Card 1 of 1</span>
                <button onclick="changeEditorIndex(1)" class="p-2">▶</button>
            </div>

            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                <label class="text-[10px] text-gray-500 uppercase font-bold">Image URL</label>
                <input type="text" id="edit-img" oninput="syncEditor()" class="w-full bg-black p-2 rounded text-xs mb-4 border border-gray-800">
                
                <img id="edit-preview-img" src="" class="w-full h-48 object-cover rounded mb-4 shadow-2xl">

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Name</label>
                        <input type="text" id="edit-name" oninput="syncEditor()" class="w-full bg-black p-2 rounded text-sm font-bold border border-gray-800">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold">Tag Link</label>
                        <div id="edit-tag" class="text-[9px] bg-gray-800 p-2 rounded truncate text-gray-400 mt-1">Unlinked</div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div>
                        <label class="text-[10px] text-red-500 font-bold">HP</label>
                        <input type="number" id="edit-hp" oninput="syncEditor()" class="w-full bg-black p-2 rounded border border-gray-800">
                    </div>
                    <div>
                        <label class="text-[10px] text-orange-500 font-bold">ATK</label>
                        <input type="number" id="edit-atk" oninput="syncEditor()" class="w-full bg-black p-2 rounded border border-gray-800">
                    </div>
                    <div>
                        <label class="text-[10px] text-blue-500 font-bold">DEF</label>
                        <input type="number" id="edit-def" oninput="syncEditor()" class="w-full bg-black p-2 rounded border border-gray-800">
                    </div>
                </div>

                <div class="space-y-2 mb-6">
                    <label class="text-[10px] text-gray-500 uppercase font-bold">Custom Move Names</label>
                    <input type="text" id="edit-m-atk" oninput="syncEditor()" placeholder="Attack Name" class="w-full bg-black p-2 rounded text-xs border border-gray-800">
                    <input type="text" id="edit-m-def" oninput="syncEditor()" placeholder="Defense Name" class="w-full bg-black p-2 rounded text-xs border border-gray-800">
                    <input type="text" id="edit-m-heal" oninput="syncEditor()" placeholder="Heal Name" class="w-full bg-black p-2 rounded text-xs border border-gray-800">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <button onclick="cloneCurrent()" class="bg-blue-900/30 text-blue-400 py-3 rounded text-[10px] font-bold uppercase">Clone</button>
                    <button onclick="deleteCurrent()" class="bg-red-900/30 text-red-400 py-3 rounded text-[10px] font-bold uppercase">Delete</button>
                </div>
            </div>
        </div>
    </section>

    <!-- ARENA OVERLAY -->
    <div id="arena" class="hidden fixed inset-0 bg-black z-[100] p-4 flex flex-col">
        <div id="arena-stage" class="flex-grow flex items-center justify-between gap-4"></div>
        <div id="battleLog" class="h-24 bg-gray-900 rounded p-2 font-mono text-[10px] overflow-y-auto mb-4 border border-gray-800 text-gray-400"></div>
        <div id="moveGrid" class="grid grid-cols-2 gap-2"></div>
    </div>

    <script>
        let deck = JSON.parse(localStorage.getItem('nfc_deck_v2')) || [];
        let editIdx = 0;
        let p1 = null, p2 = null;
        let turn = 1;

        window.onload = () => {
            if (deck.length === 0) {
                deck.push(generateCard("Cyber Shark", "https://picsum.photos/seed/shark/400/600", "starter_1"));
                save();
            }
            renderDeck();
            loadEditor();
        };

        function generateCard(name, img, id) {
            return {
                id: id || "temp_" + Date.now(),
                name: name || "New Hero",
                img: img || "https://picsum.photos/400/600",
                hp: 20, maxHp: 20, atk: 5, def: 2,
                moves: { atk: "Strike", def: "Shield", heal: "Repair" },
                poisoned: false
            };
        }

        // --- NFC ---
        async function startNFC() {
            if (!('NDEFReader' in window)) return alert("NFC not supported.");
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('nfcBtn').innerText = "NFC ACTIVATED";
                document.getElementById('nfcBtn').className = "bg-green-600 text-white text-[10px] font-black py-2 px-4 rounded-full";
                
                ndef.onreading = event => {
                    const id = event.serialNumber;
                    const card = deck.find(c => c.id === id);
                    if (card) { selectForBattle(card.id); } 
                    else if (confirm("New Tag! Link to current editor card?")) {
                        deck[editIdx].id = id; save(); loadEditor();
                    }
                };
            } catch (e) { alert("NFC Error. Check HTTPS."); }
        }

        // --- COLLECTION & SELECTION ---
        function renderDeck() {
            const grid = document.getElementById('deckGrid');
            grid.innerHTML = deck.map(c => `
                <div onclick="selectForBattle('${c.id}')" class="bg-gray-900 rounded-xl overflow-hidden border-2 transition-all ${p1?.id === c.id ? 'card-p1' : (p2?.id === c.id ? 'card-p2' : 'border-transparent')}">
                    <img src="${c.img}" class="w-full h-28 object-cover opacity-70">
                    <div class="p-2 text-[10px]">
                        <div class="font-black uppercase truncate">${c.name}</div>
                        <div class="text-gray-500">HP:${c.hp} ATK:${c.atk}</div>
                    </div>
                </div>
            `).join('');
        }

        function selectForBattle(id) {
            const card = deck.find(c => c.id === id);
            if (p1?.id === id) p1 = null;
            else if (p2?.id === id) p2 = null;
            else if (!p1) p1 = JSON.parse(JSON.stringify(card));
            else if (!p2) p2 = JSON.parse(JSON.stringify(card));
            
            document.getElementById('slot-1').innerHTML = p1 ? `<img src="${p1.img}" class="h-full w-full object-cover">` : "P1 SLOT";
            document.getElementById('slot-2').innerHTML = p2 ? `<img src="${p2.img}" class="h-full w-full object-cover">` : "P2 SLOT";
            document.getElementById('battleStartBtn').classList.toggle('hidden', !(p1 && p2));
            renderDeck();
        }

        // --- THE LAB (EDITOR) ---
        function loadEditor() {
            const c = deck[editIdx];
            document.getElementById('editorInfo').innerText = `Card ${editIdx+1} of ${deck.length}`;
            document.getElementById('edit-name').value = c.name;
            document.getElementById('edit-img').value = c.img;
            document.getElementById('edit-hp').value = c.hp;
            document.getElementById('edit-atk').value = c.atk;
            document.getElementById('edit-def').value = c.def;
            document.getElementById('edit-tag').innerText = c.id;
            document.getElementById('edit-m-atk').value = c.moves.atk;
            document.getElementById('edit-m-def').value = c.moves.def;
            document.getElementById('edit-m-heal').value = c.moves.heal;
            document.getElementById('edit-preview-img').src = c.img;
        }

        function syncEditor() {
            const c = deck[editIdx];
            c.name = document.getElementById('edit-name').value;
            c.img = document.getElementById('edit-img').value;
            c.hp = parseInt(document.getElementById('edit-hp').value) || 1;
            c.maxHp = c.hp;
            c.atk = parseInt(document.getElementById('edit-atk').value) || 0;
            c.def = parseInt(document.getElementById('edit-def').value) || 0;
            c.moves.atk = document.getElementById('edit-m-atk').value;
            c.moves.def = document.getElementById('edit-m-def').value;
            c.moves.heal = document.getElementById('edit-m-heal').value;
            document.getElementById('edit-preview-img').src = c.img;
            save(); renderDeck();
        }

        function changeEditorIndex(dir) {
            editIdx = (editIdx + dir + deck.length) % deck.length;
            loadEditor();
        }

        function createNewCard() {
            deck.push(generateCard());
            editIdx = deck.length - 1;
            save(); switchTab('editor'); loadEditor();
        }

        function cloneCurrent() {
            let clone = JSON.parse(JSON.stringify(deck[editIdx]));
            clone.id = "clone_" + Date.now();
            deck.push(clone); save(); changeEditorIndex(1);
        }

        function deleteCurrent() {
            if(deck.length <= 1) return;
            deck.splice(editIdx, 1);
            editIdx = 0; save(); loadEditor(); renderDeck();
        }

        // --- BATTLE LOGIC ---
        function openArena() {
            document.getElementById('arena').classList.remove('hidden');
            renderArena();
        }

        function renderArena() {
            const stage = document.getElementById('arena-stage');
            stage.innerHTML = `
                ${fighterUI(p1, 'P1', 'border-red-500')}
                ${fighterUI(p2, 'P2', 'border-blue-500')}
            `;
            const actor = turn === 1 ? p1 : p2;
            document.getElementById('moveGrid').innerHTML = `
                <button onclick="doMove('atk')" class="bg-red-700 p-4 rounded font-bold text-xs uppercase">${actor.moves.atk}</button>
                <button onclick="doMove('def')" class="bg-blue-700 p-4 rounded font-bold text-xs uppercase">${actor.moves.def}</button>
                <button onclick="doMove('heal')" class="bg-green-700 p-4 rounded font-bold text-xs uppercase">${actor.moves.heal}</button>
                <button onclick="doMove('takeover')" class="bg-purple-700 p-4 rounded font-bold text-[8px] uppercase">Hostile Takeover</button>
                <button onclick="doMove('wealth')" class="bg-yellow-600 text-black p-4 rounded font-bold text-xs uppercase col-span-2">Wealth Buff</button>
            `;
        }

        function fighterUI(c, label, border) {
            return `<div class="w-1/2 flex flex-col items-center">
                <div class="relative w-full aspect-[3/4] rounded-xl overflow-hidden border-4 ${border} ${c.poisoned?'poison-anim':''}">
                    <img src="${c.img}" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 w-full bg-black/80 p-2">
                        <div class="w-full bg-gray-700 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-green-500 h-full" style="width:${(c.hp/c.maxHp)*100}%"></div>
                        </div>
                    </div>
                </div>
                <div class="text-[8px] font-bold mt-1 text-gray-500">${label}: ${c.name}</div>
            </div>`;
        }

        function doMove(type) {
            const actor = turn === 1 ? p1 : p2;
            const target = turn === 1 ? p2 : p1;
            let msg = "";

            if (type === 'atk') {
                let d = Math.max(1, actor.atk - target.def);
                target.hp -= d; msg = `${actor.name} hit for ${d}!`;
            } else if (type === 'def') {
                actor.def += 1; msg = `${actor.name} boosted DEF!`;
            } else if (type === 'heal') {
                actor.hp = Math.min(actor.maxHp, actor.hp + 5); msg = `${actor.name} healed!`;
            } else if (type === 'takeover') {
                if (Math.random() > 0.3) {
                    let dmg = Math.floor(Math.random() * 2) + 1;
                    target.hp -= dmg; target.poisoned = true;
                    msg = `Poisoned ${target.name} for ${dmg}!`;
                } else { msg = "Takeover missed!"; }
            } else if (type === 'wealth') {
                if (Math.random() < 0.9) {
                    let b = Math.floor(Math.random() * 3) + 1;
                    actor.atk += b; msg = `Wealth boost +${b} ATK!`;
                } else { actor.atk = Math.max(0, actor.atk - 2); msg = "Market Crash! ATK down!"; }
            }

            if (actor.poisoned) { actor.hp -= 1; addLog(`${actor.name} took 1 poison dmg.`); }
            addLog(msg);

            if (target.hp <= 0) { alert(actor.name + " WINS!"); location.reload(); }
            else { turn = turn === 1 ? 2 : 1; renderArena(); }
        }

        function addLog(m) { const l = document.getElementById('battleLog'); l.innerHTML = `<div>> ${m}</div>` + l.innerHTML; }
        function save() { localStorage.setItem('nfc_deck_v2', JSON.stringify(deck)); }
        function switchTab(t) {
            document.getElementById('view-collection').classList.toggle('hidden', t !== 'collection');
            document.getElementById('view-editor').classList.toggle('hidden', t !== 'editor');
            document.getElementById('btn-collection').classList.toggle('tab-active', t === 'collection');
            document.getElementById('btn-editor').classList.toggle('tab-active', t === 'editor');
        }
    </script>
</body>
</html>
