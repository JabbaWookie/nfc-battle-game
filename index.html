<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Realm: Data Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(10px); }
        .card-p1 { border: 4px solid #f85149; box-shadow: 0 0 15px rgba(248, 81, 73, 0.4); }
        .card-p2 { border: 4px solid #58a6ff; box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); }
        .tab-active { color: #f2cc60; border-bottom: 2px solid #f2cc60; }
        .poison-anim { animation: poison-pulse 2s infinite; }
        @keyframes poison-pulse {
            0%, 100% { box-shadow: 0 0 0px rgba(63, 185, 80, 0); }
            50% { box-shadow: 0 0 20px rgba(63, 185, 80, 0.8); }
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <header class="p-4 bg-gray-900 flex justify-between items-center sticky top-0 z-50 border-b border-gray-800">
        <h1 class="text-xl font-black italic text-yellow-500 tracking-tighter">NFC REALM</h1>
        <div class="flex gap-2">
            <button id="scanBtn" onclick="activateNFC('identify')" class="bg-blue-600 text-white text-[10px] font-black py-2 px-3 rounded-full uppercase">Identify Tag</button>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 flex justify-around p-3 z-50">
        <button onclick="switchTab('collection')" id="btn-collection" class="text-[10px] font-bold uppercase tracking-widest tab-active">Collection</button>
        <button onclick="switchTab('editor')" id="btn-editor" class="text-[10px] font-bold uppercase tracking-widest text-gray-400">The Lab</button>
    </nav>

    <!-- VIEW: COLLECTION -->
    <section id="view-collection" class="p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-bold text-gray-500 uppercase">Your Deck</h2>
            <button onclick="createNewCard()" class="text-[10px] bg-white text-black px-3 py-1 rounded-full font-bold uppercase tracking-tighter">+ Create New</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div id="slot-1" class="h-28 border border-dashed border-red-500/30 rounded-xl flex items-center justify-center text-[10px] font-bold text-red-500 bg-red-900/10">P1 SLOT</div>
            <div id="slot-2" class="h-28 border border-dashed border-blue-500/30 rounded-xl flex items-center justify-center text-[10px] font-bold text-blue-500 bg-blue-900/10">P2 SLOT</div>
        </div>

        <button id="battleStartBtn" onclick="openArena()" class="hidden w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase mb-6 tracking-widest shadow-lg shadow-yellow-500/20">Enter Arena</button>

        <div id="deckGrid" class="grid grid-cols-2 gap-4"></div>
    </section>

    <!-- VIEW: THE LAB (EDITOR) -->
    <section id="view-editor" class="hidden p-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-4 bg-gray-900 p-2 rounded-xl">
                <button onclick="changeEditorIndex(-1)" class="p-2 text-yellow-500">◀</button>
                <span id="editorInfo" class="text-[10px] font-bold uppercase tracking-widest">Card 1 / 1</span>
                <button onclick="changeEditorIndex(1)" class="p-2 text-yellow-500">▶</button>
            </div>

            <div class="bg-gray-900 p-5 rounded-3xl border border-gray-800">
                <div class="relative mb-4">
                    <img id="edit-preview-img" src="" class="w-full h-52 object-cover rounded-2xl shadow-2xl border border-gray-700">
                    <button onclick="activateNFC('link')" class="absolute top-2 right-2 bg-black/70 text-white text-[9px] font-bold p-2 rounded-lg border border-white/20">LINK TO TAG</button>
                </div>

                <div class="space-y-3">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Hero Image URL</label>
                        <input type="text" id="edit-img" oninput="syncEditor()" class="w-full bg-black p-2 rounded-xl text-xs border border-gray-800 focus:border-yellow-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold ml-1">Hero Name</label>
                        <input type="text" id="edit-name" oninput="syncEditor()" class="w-full bg-black p-2 rounded-xl text-sm font-bold border border-gray-800 focus:border-yellow-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 my-4">
                    <div class="bg-black p-2 rounded-xl border border-gray-800">
                        <label class="block text-[9px] text-red-500 font-bold uppercase">HP</label>
                        <input type="number" id="edit-hp" oninput="syncEditor()" class="w-full bg-transparent text-sm font-bold outline-none">
                    </div>
                    <div class="bg-black p-2 rounded-xl border border-gray-800">
                        <label class="block text-[9px] text-orange-500 font-bold uppercase">ATK</label>
                        <input type="number" id="edit-atk" oninput="syncEditor()" class="w-full bg-transparent text-sm font-bold outline-none">
                    </div>
                    <div class="bg-black p-2 rounded-xl border border-gray-800">
                        <label class="block text-[9px] text-blue-500 font-bold uppercase">DEF</label>
                        <input type="number" id="edit-def" oninput="syncEditor()" class="w-full bg-transparent text-sm font-bold outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-2 mb-6">
                    <input type="text" id="edit-m-atk" oninput="syncEditor()" placeholder="Attack" class="bg-black p-2 rounded-lg text-[10px] border border-gray-800">
                    <input type="text" id="edit-m-def" oninput="syncEditor()" placeholder="Defend" class="bg-black p-2 rounded-lg text-[10px] border border-gray-800">
                    <input type="text" id="edit-m-heal" oninput="syncEditor()" placeholder="Heal" class="bg-black p-2 rounded-lg text-[10px] border border-gray-800">
                </div>

                <div class="border-t border-gray-800 pt-4 mt-4">
                    <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-2">Data Core</h3>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="exportSingle()" class="flex-1 bg-gray-800 text-[9px] py-2 rounded-lg uppercase font-bold">Copy JSON</button>
                        <button onclick="importJSON()" class="flex-1 bg-gray-800 text-[9px] py-2 rounded-lg uppercase font-bold">Import</button>
                        <button onclick="cloneCurrent()" class="flex-1 bg-gray-800 text-[9px] py-2 rounded-lg uppercase font-bold">Clone</button>
                        <button onclick="deleteCurrent()" class="flex-1 bg-red-900/20 text-red-500 text-[9px] py-2 rounded-lg uppercase font-bold">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ARENA OVERLAY -->
    <div id="arena" class="hidden fixed inset-0 bg-black z-[100] p-4 flex flex-col">
        <div id="arena-stage" class="flex-grow flex items-center justify-between gap-4"></div>
        <div id="battleLog" class="h-28 bg-gray-900 rounded-xl p-3 font-mono text-[10px] overflow-y-auto mb-4 border border-gray-800 text-gray-400"></div>
        <div id="moveGrid" class="grid grid-cols-2 gap-2"></div>
    </div>

    <script>
        let deck = JSON.parse(localStorage.getItem('nfc_realm_deck')) || [];
        let editIdx = 0;
        let p1 = null, p2 = null;
        let turn = 1;
        let nfcMode = null; // 'link' or 'identify'

        window.onload = () => {
            if (deck.length === 0) {
                deck.push(createCardData("Cyber Shark", "https://picsum.photos/seed/shark/400/600", "starter_1"));
                save();
            }
            renderDeck();
            loadEditor();
        };

        function createCardData(name, img, id) {
            return {
                id: id || "temp_" + Date.now(),
                name: name || "New Hero",
                img: img || "https://picsum.photos/400/600",
                hp: 20, maxHp: 20, atk: 5, def: 2,
                moves: { atk: "Strike", def: "Shield", heal: "Repair" },
                poisoned: false
            };
        }

        // --- NFC ENGINE ---
        async function activateNFC(mode) {
            if (!('NDEFReader' in window)) return alert("NFC not supported.");
            nfcMode = mode;
            
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                if(mode === 'link') alert("LINK MODE: Tap the tag you want to link to this character.");
                if(mode === 'identify') alert("IDENTIFY MODE: Tap a tag to select its character.");

                ndef.onreading = event => {
                    const tagId = event.serialNumber;
                    
                    if(nfcMode === 'link') {
                        deck[editIdx].id = tagId;
                        save(); loadEditor(); renderDeck();
                        alert(`Success! Character linked to tag: ${tagId}`);
                    } 
                    else if(nfcMode === 'identify') {
                        const card = deck.find(c => c.id === tagId);
                        if(card) {
                            selectForBattle(card.id);
                        } else {
                            alert("This tag isn't linked to any character in your deck.");
                        }
                    }
                };
            } catch (e) { alert("NFC Denied. Ensure you are on HTTPS."); }
        }

        // --- DECK MANAGEMENT ---
        function renderDeck() {
            const grid = document.getElementById('deckGrid');
            grid.innerHTML = deck.map(c => `
                <div onclick="selectForBattle('${c.id}')" class="bg-gray-900 rounded-2xl overflow-hidden border-2 transition-all ${p1?.id === c.id ? 'card-p1' : (p2?.id === c.id ? 'card-p2' : 'border-transparent')}">
                    <img src="${c.img}" class="w-full h-32 object-cover opacity-80">
                    <div class="p-3">
                        <div class="text-xs font-black uppercase truncate">${c.name}</div>
                        <div class="text-[9px] text-gray-500 mt-1">HP ${c.hp} / ATK ${c.atk}</div>
                    </div>
                </div>
            `).join('');
        }

        function selectForBattle(id) {
            const card = deck.find(c => c.id === id);
            if (p1?.id === id) p1 = null;
            else if (p2?.id === id) p2 = null;
            else if (!p1) p1 = JSON.parse(JSON.stringify(card));
            else if (!p2) p2 = JSON.parse(JSON.stringify(card));
            
            document.getElementById('slot-1').innerHTML = p1 ? `<img src="${p1.img}" class="h-full w-full object-cover rounded-lg">` : "P1 SLOT";
            document.getElementById('slot-2').innerHTML = p2 ? `<img src="${p2.img}" class="h-full w-full object-cover rounded-lg">` : "P2 SLOT";
            document.getElementById('battleStartBtn').classList.toggle('hidden', !(p1 && p2));
            renderDeck();
        }

        // --- THE LAB ---
        function loadEditor() {
            const c = deck[editIdx];
            if(!c) return;
            document.getElementById('editorInfo').innerText = `Card ${editIdx+1} / ${deck.length}`;
            document.getElementById('edit-name').value = c.name;
            document.getElementById('edit-img').value = c.img;
            document.getElementById('edit-hp').value = c.hp;
            document.getElementById('edit-atk').value = c.atk;
            document.getElementById('edit-def').value = c.def;
            document.getElementById('edit-m-atk').value = c.moves.atk;
            document.getElementById('edit-m-def').value = c.moves.def;
            document.getElementById('edit-m-heal').value = c.moves.heal;
            document.getElementById('edit-preview-img').src = c.img;
        }

        function syncEditor() {
            const c = deck[editIdx];
            c.name = document.getElementById('edit-name').value;
            c.img = document.getElementById('edit-img').value;
            c.hp = parseInt(document.getElementById('edit-hp').value) || 1;
            c.maxHp = c.hp;
            c.atk = parseInt(document.getElementById('edit-atk').value) || 0;
            c.def = parseInt(document.getElementById('edit-def').value) || 0;
            c.moves.atk = document.getElementById('edit-m-atk').value;
            c.moves.def = document.getElementById('edit-m-def').value;
            c.moves.heal = document.getElementById('edit-m-heal').value;
            document.getElementById('edit-preview-img').src = c.img;
            save(); renderDeck();
        }

        // --- IMPORT / EXPORT ---
        function exportSingle() {
            const data = JSON.stringify(deck[editIdx]);
            navigator.clipboard.writeText(data);
            alert("Character JSON copied to clipboard!");
        }

        function importJSON() {
            const str = prompt("Paste Character JSON here:");
            if(!str) return;
            try {
                const obj = JSON.parse(str);
                obj.id = "imported_" + Date.now(); // Reset ID to prevent conflicts
                deck.push(obj);
                save(); renderDeck();
                editIdx = deck.length - 1;
                loadEditor();
            } catch(e) { alert("Invalid JSON data."); }
        }

        function changeEditorIndex(dir) {
            editIdx = (editIdx + dir + deck.length) % deck.length;
            loadEditor();
        }

        function createNewCard() {
            deck.push(createCardData());
            editIdx = deck.length - 1;
            save(); switchTab('editor'); loadEditor();
        }

        function cloneCurrent() {
            let clone = JSON.parse(JSON.stringify(deck[editIdx]));
            clone.id = "clone_" + Date.now();
            deck.push(clone); save(); changeEditorIndex(1);
        }

        function deleteCurrent() {
            if(deck.length <= 1) return;
            deck.splice(editIdx, 1);
            editIdx = 0; save(); loadEditor(); renderDeck();
        }

        // --- BATTLE LOGIC (Standard Port) ---
        function openArena() {
            document.getElementById('arena').classList.remove('hidden');
            renderArena();
        }

        function renderArena() {
            const stage = document.getElementById('arena-stage');
            stage.innerHTML = `
                ${fighterUI(p1, 'P1', 'border-red-500')}
                ${fighterUI(p2, 'P2', 'border-blue-500')}
            `;
            const actor = turn === 1 ? p1 : p2;
            document.getElementById('moveGrid').innerHTML = `
                <button onclick="doMove('atk')" class="bg-red-700 p-4 rounded-xl font-bold text-xs uppercase shadow-lg shadow-red-900/30">${actor.moves.atk}</button>
                <button onclick="doMove('def')" class="bg-blue-700 p-4 rounded-xl font-bold text-xs uppercase shadow-lg shadow-blue-900/30">${actor.moves.def}</button>
                <button onclick="doMove('heal')" class="bg-green-700 p-4 rounded-xl font-bold text-xs uppercase shadow-lg shadow-green-900/30">${actor.moves.heal}</button>
                <button onclick="doMove('takeover')" class="bg-purple-700 p-4 rounded-xl font-bold text-[8px] uppercase">Takeover</button>
                <button onclick="doMove('wealth')" class="bg-yellow-600 text-black p-4 rounded-xl font-bold text-xs uppercase col-span-2">Wealth Buff</button>
            `;
        }

        function fighterUI(c, label, border) {
            return `<div class="w-1/2 flex flex-col items-center">
                <div class="relative w-full aspect-[3/4] rounded-2xl overflow-hidden border-4 ${border} ${c.poisoned?'poison-anim':''}">
                    <img src="${c.img}" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 w-full bg-black/80 p-2">
                        <div class="w-full bg-gray-700 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-green-500 h-full" style="width:${(c.hp/c.maxHp)*100}%"></div>
                        </div>
                    </div>
                </div>
                <div class="text-[9px] font-black mt-2 text-gray-500 uppercase">${c.name}</div>
            </div>`;
        }

        function doMove(type) {
            const actor = turn === 1 ? p1 : p2;
            const target = turn === 1 ? p2 : p1;
            let msg = "";

            if (type === 'atk') {
                let d = Math.max(1, actor.atk - target.def);
                target.hp -= d; msg = `${actor.name} hit for ${d}!`;
            } else if (type === 'def') {
                actor.def += 1; msg = `${actor.name} boosted DEF!`;
            } else if (type === 'heal') {
                actor.hp = Math.min(actor.maxHp, actor.hp + 5); msg = `${actor.name} healed!`;
            } else if (type === 'takeover') {
                if (Math.random() > 0.3) {
                    let dmg = Math.floor(Math.random() * 2) + 1;
                    target.hp -= dmg; target.poisoned = true;
                    msg = `Poisoned ${target.name} for ${dmg}!`;
                } else { msg = "Takeover missed!"; }
            } else if (type === 'wealth') {
                if (Math.random() < 0.9) {
                    let b = Math.floor(Math.random() * 3) + 1;
                    actor.atk += b; msg = `Wealth boost +${b} ATK!`;
                } else { actor.atk = Math.max(0, actor.atk - 2); msg = "Market Crash! ATK down!"; }
            }

            if (actor.poisoned) { actor.hp -= 1; addLog(`${actor.name} took 1 poison dmg.`); }
            addLog(msg);

            if (target.hp <= 0) { alert(actor.name + " WINS!"); location.reload(); }
            else { turn = turn === 1 ? 2 : 1; renderArena(); }
        }

        function addLog(m) { const l = document.getElementById('battleLog'); l.innerHTML = `<div>> ${m}</div>` + l.innerHTML; }
        function save() { localStorage.setItem('nfc_realm_deck', JSON.stringify(deck)); }
        function switchTab(t) {
            document.getElementById('view-collection').classList.toggle('hidden', t !== 'collection');
            document.getElementById('view-editor').classList.toggle('hidden', t !== 'editor');
            document.getElementById('btn-collection').classList.toggle('tab-active', t === 'collection');
            document.getElementById('btn-editor').classList.toggle('tab-active', t === 'editor');
        }
    </script>
</body>
</html>
