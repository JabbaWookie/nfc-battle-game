<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Card Collector & Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-selected-p1 { border: 4px solid #ef4444; transform: translateY(-5px); }
        .card-selected-p2 { border: 4px solid #3b82f6; transform: translateY(-5px); }
        .poisoned { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen pb-10">

    <!-- Top Status Bar -->
    <nav class="p-4 bg-gray-900 border-b border-gray-800 flex justify-between items-center sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-black italic tracking-widest text-yellow-500">NFC REALM</h1>
            <p id="nfcStatus" class="text-[10px] text-gray-400">TAP "ACTIVATE NFC" TO COLLECT</p>
        </div>
        <button id="nfcBtn" onclick="startNFC()" class="bg-yellow-600 hover:bg-yellow-500 text-black text-xs font-bold py-2 px-4 rounded-full transition-all">
            ACTIVATE NFC
        </button>
    </nav>

    <!-- Battle Selection Area -->
    <div id="selectionArea" class="p-4 bg-gray-900/50 backdrop-blur-md">
        <div class="flex justify-around items-center gap-4 mb-4">
            <div id="slot-1" class="w-1/2 h-32 border-2 border-dashed border-red-900/50 rounded-xl flex flex-col items-center justify-center text-center p-2 bg-red-950/10">
                <span class="text-xs text-red-700 font-bold">PLAYER 1</span>
                <p class="text-[10px] text-gray-500">Tap a card below</p>
            </div>
            <div class="text-xl font-black text-gray-700 italic">VS</div>
            <div id="slot-2" class="w-1/2 h-32 border-2 border-dashed border-blue-900/50 rounded-xl flex flex-col items-center justify-center text-center p-2 bg-blue-950/10">
                <span class="text-xs text-blue-700 font-bold">PLAYER 2</span>
                <p class="text-[10px] text-gray-500">Tap a card below</p>
            </div>
        </div>
        
        <button id="battleBtn" onclick="initiateBattle()" class="hidden w-full bg-white text-black font-black py-4 rounded-lg uppercase tracking-tighter hover:bg-yellow-400 transition-colors">
            Enter Battle Arena
        </button>
    </div>

    <!-- Battle Arena (Hidden by default) -->
    <div id="arena" class="hidden fixed inset-0 bg-black z-[100] p-4 flex flex-col">
        <div id="arena-content" class="flex-grow">
             <!-- Dynamic Battle UI -->
        </div>
        <div id="battleLog" class="h-32 bg-gray-900 rounded p-3 font-mono text-xs overflow-y-auto border border-gray-800 mb-4"></div>
        <div id="moveControls" class="grid grid-cols-2 gap-2"></div>
    </div>

    <!-- My Collection -->
    <main class="p-4">
        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">My Collection</h2>
        <div id="deckGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            <!-- Cards appear here -->
        </div>
    </main>

    <script>
        let deck = JSON.parse(localStorage.getItem('nfc_battle_deck')) || [];
        let p1Selected = null;
        let p2Selected = null;
        let p1Active = null;
        let p2Active = null;
        let turn = 1;

        const moveSet = {
            attacks: ["Plasma Strike", "Binary Slash", "Neural Spike"],
            defends: ["Data Shield", "Proxy Wall", "Encryption"],
            heals: ["System Restore", "Debug Cache", "Cloud Sync"]
        };

        window.onload = () => {
            if (deck.length === 0) generateStarters();
            renderDeck();
        };

        function generateStarters() {
            const starters = ["Cyber Monk", "Data Wraith", "Silicon Golem", "Logic Bomb"];
            starters.forEach((name, i) => {
                deck.push(createCardData(name, `https://picsum.photos/seed/${name}/200/300`, `starter_${i}`));
            });
            saveDeck();
        }

        function createCardData(name, img, tagId) {
            return {
                id: tagId,
                name: name,
                img: img,
                hp: 25,
                maxHp: 25,
                atk: Math.floor(Math.random() * 4) + 4,
                def: Math.floor(Math.random() * 2) + 2,
                poisoned: false,
                moves: {
                    attack: moveSet.attacks[Math.floor(Math.random() * 3)],
                    defend: moveSet.defends[Math.floor(Math.random() * 3)],
                    heal: moveSet.heals[Math.floor(Math.random() * 3)]
                }
            };
        }

        async function startNFC() {
            if (!('NDEFReader' in window)) {
                alert("NFC not supported on this browser/device.");
                return;
            }
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('nfcStatus').innerText = "SCANNING FOR CARDS...";
                document.getElementById('nfcBtn').classList.add('bg-green-600');
                
                ndef.onreading = event => {
                    const tagId = event.serialNumber;
                    const exists = deck.find(c => c.id === tagId);
                    
                    if (!exists) {
                        const newName = prompt("New card detected! Name your card:", "Techno Hunter");
                        if (newName) {
                            const newCard = createCardData(newName, `https://picsum.photos/seed/${tagId}/200/300`, tagId);
                            deck.push(newCard);
                            saveDeck();
                            renderDeck();
                        }
                    } else {
                        alert(`Card "${exists.name}" is already in your collection!`);
                    }
                };
            } catch (err) {
                alert("Error connecting to NFC sensor.");
            }
        }

        function selectCard(cardId) {
            const card = deck.find(c => c.id === cardId);
            
            if (!p1Selected) {
                p1Selected = card;
            } else if (!p2Selected && p1Selected.id !== cardId) {
                p2Selected = card;
            } else {
                // Toggle off
                if (p1Selected?.id === cardId) p1Selected = null;
                else if (p2Selected?.id === cardId) p2Selected = null;
            }
            
            updateSelectionUI();
        }

        function updateSelectionUI() {
            const s1 = document.getElementById('slot-1');
            const s2 = document.getElementById('slot-2');
            const btn = document.getElementById('battleBtn');

            s1.innerHTML = p1Selected ? `<img src="${p1Selected.img}" class="w-full h-full object-cover rounded-lg">` : `<span class="text-xs text-red-700 font-bold">PLAYER 1</span>`;
            s2.innerHTML = p2Selected ? `<img src="${p2Selected.img}" class="w-full h-full object-cover rounded-lg">` : `<span class="text-xs text-blue-700 font-bold">PLAYER 2</span>`;
            
            btn.classList.toggle('hidden', !(p1Selected && p2Selected));
            renderDeck();
        }

        function renderDeck() {
            const grid = document.getElementById('deckGrid');
            grid.innerHTML = deck.map(card => {
                let borderClass = "";
                if (p1Selected?.id === card.id) borderClass = "card-selected-p1";
                if (p2Selected?.id === card.id) borderClass = "card-selected-p2";

                return `
                <div onclick="selectCard('${card.id}')" class="bg-gray-900 rounded-xl overflow-hidden cursor-pointer transition-all ${borderClass}">
                    <img src="${card.img}" class="w-full h-32 object-cover opacity-80">
                    <div class="p-2">
                        <h3 class="text-[10px] font-black uppercase truncate">${card.name}</h3>
                        <div class="flex justify-between text-[8px] text-gray-500 mt-1">
                            <span>ATK ${card.atk}</span>
                            <span>DEF ${card.def}</span>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // --- BATTLE LOGIC ---
        function initiateBattle() {
            p1Active = JSON.parse(JSON.stringify(p1Selected));
            p2Active = JSON.parse(JSON.stringify(p2Selected));
            document.getElementById('arena').classList.remove('hidden');
            renderArena();
            log("The battle begins!");
        }

        function renderArena() {
            const arena = document.getElementById('arena-content');
            arena.innerHTML = `
                <div class="flex justify-between gap-4 mt-10">
                    ${fighterHTML(p1Active, 'P1')}
                    ${fighterHTML(p2Active, 'P2')}
                </div>
            `;

            const controls = document.getElementById('moveControls');
            const currentActor = turn === 1 ? p1Active : p2Active;
            
            controls.innerHTML = `
                <button onclick="playMove('atk')" class="bg-red-700 p-3 rounded font-bold text-xs uppercase">${currentActor.moves.attack}</button>
                <button onclick="playMove('def')" class="bg-blue-700 p-3 rounded font-bold text-xs uppercase">${currentActor.moves.defend}</button>
                <button onclick="playMove('heal')" class="bg-green-700 p-3 rounded font-bold text-xs uppercase">${currentActor.moves.heal}</button>
                <button onclick="playMove('takeover')" class="bg-purple-700 p-3 rounded font-bold text-xs uppercase">Takeover</button>
                <button onclick="playMove('wealth')" class="bg-yellow-600 text-black p-3 rounded font-bold text-xs uppercase col-span-2">Wealth Buff</button>
            `;
        }

        function fighterHTML(card, label) {
            return `
                <div class="w-1/2 flex flex-col items-center">
                    <div class="relative w-full aspect-[3/4] rounded-xl overflow-hidden border-2 ${label === 'P1' ? 'border-red-500' : 'border-blue-500'} ${card.poisoned ? 'poisoned' : ''}">
                        <img src="${card.img}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 w-full bg-black/80 p-2">
                            <div class="text-[10px] font-bold">${card.name}</div>
                            <div class="w-full bg-gray-700 h-1.5 rounded-full mt-1">
                                <div class="bg-green-500 h-full" style="width: ${(card.hp/card.maxHp)*100}%"></div>
                            </div>
                        </div>
                    </div>
                    <span class="text-[10px] mt-2 font-bold opacity-50 uppercase">${label}</span>
                </div>
            `;
        }

        function playMove(type) {
            const actor = turn === 1 ? p1Active : p2Active;
            const target = turn === 1 ? p2Active : p1Active;
            let m = "";

            if (type === 'atk') {
                let dmg = Math.max(1, actor.atk - target.def);
                target.hp -= dmg;
                m = `${actor.name} used ${actor.moves.attack} for ${dmg} damage!`;
            } else if (type === 'def') {
                actor.def += 1;
                m = `${actor.name} bolstered defenses! (+1 DEF)`;
            } else if (type === 'heal') {
                actor.hp = Math.min(actor.maxHp, actor.hp + 5);
                m = `${actor.name} restored 5 HP.`;
            } else if (type === 'takeover') {
                if (Math.random() > 0.3) {
                    target.poisoned = true;
                    let dmg = Math.floor(Math.random() * 2) + 1;
                    target.hp -= dmg;
                    m = `HOSTILE TAKEOVER! ${target.name} poisoned (-${dmg} HP)`;
                } else { m = "Hostile Takeover failed!"; }
            } else if (type === 'wealth') {
                if (Math.random() < 0.9) {
                    let b = Math.floor(Math.random() * 3) + 1;
                    actor.atk += b;
                    m = `Wealth Buff! ATK increased by ${b}!`;
                } else {
                    actor.atk = Math.max(1, actor.atk - 2);
                    m = `Wealth Buff BACKFIRED! ATK reduced!`;
                }
            }

            if (actor.poisoned) { actor.hp -= 1; log(`${actor.name} suffered 1 poison damage.`); }

            log(m);
            if (target.hp <= 0) {
                alert(`${actor.name} wins!`);
                location.reload();
            } else {
                turn = turn === 1 ? 2 : 1;
                renderArena();
            }
        }

        function log(msg) {
            const l = document.getElementById('battleLog');
            l.innerHTML = `<div>> ${msg}</div>` + l.innerHTML;
        }

        function saveDeck() { localStorage.setItem('nfc_battle_deck', JSON.stringify(deck)); }
    </script>
</body>
</html>
